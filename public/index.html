<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Cinzel:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --crimson:        #9B0000;
      --crimson-mid:    #C41E1E;
      --crimson-bright: #E03030;
      --black:          #050505;
      --black-card:     #0D0D0D;
      --black-border:   #1A1A1A;
      --white:          #F5F0EE;
      --white-dim:      #9A8F8F;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* grain */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 999;
    }

    /* ambient glow */
    body::after {
      content: '';
      position: fixed;
      bottom: -10%; left: 50%;
      transform: translateX(-50%);
      width: 70vw; height: 50vh;
      background: radial-gradient(ellipse at center, rgba(156,0,0,0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: pulseGlow 7s ease-in-out infinite;
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: 1; transform: translateX(-50%) scale(1); }
      50%       { opacity: 0.5; transform: translateX(-50%) scale(1.1); }
    }

    /* top line */
    .top-line {
      position: fixed; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--crimson-mid), var(--crimson-bright), var(--crimson-mid), transparent);
      z-index: 100;
      transform-origin: left;
      animation: slideIn 1.2s ease forwards;
    }

    @keyframes slideIn {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }

    /* corners */
    .corner {
      position: fixed;
      width: 40px; height: 40px;
      z-index: 100;
      opacity: 0;
      animation: fadeCorner 1s ease 0.8s forwards;
    }
    .corner--tl { top: 20px; left: 20px; border-top: 1px solid var(--crimson); border-left: 1px solid var(--crimson); }
    .corner--tr { top: 20px; right: 20px; border-top: 1px solid var(--crimson); border-right: 1px solid var(--crimson); }
    .corner--bl { bottom: 20px; left: 20px; border-bottom: 1px solid var(--crimson); border-left: 1px solid var(--crimson); }
    .corner--br { bottom: 20px; right: 20px; border-bottom: 1px solid var(--crimson); border-right: 1px solid var(--crimson); }
    @keyframes fadeCorner { to { opacity: 0.6; } }

    /* stage */
    .stage {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* eyebrow */
    .eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.4em;
      color: var(--crimson-mid);
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(12px);
      animation: rise 0.9s ease 0.3s forwards;
      margin-bottom: 1.4rem;
    }

    /* headline */
    .headline {
      font-family: 'Cinzel', serif;
      font-size: clamp(2rem, 5.5vw, 4rem);
      font-weight: 700;
      letter-spacing: 0.05em;
      text-align: center;
      line-height: 1.1;
      color: var(--white);
      opacity: 0;
      transform: translateY(20px);
      animation: rise 1s ease 0.5s forwards;
    }

    .headline em {
      font-style: normal;
      background: linear-gradient(135deg, var(--crimson-bright) 0%, var(--crimson-mid) 60%, #6B0000 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* divider */
    .divider {
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--crimson), transparent);
      margin: 1.6rem auto;
      opacity: 0;
      animation: rise 0.9s ease 0.7s forwards;
    }

    /* subtext */
    .sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.9rem, 2vw, 1.15rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--white-dim);
      text-align: center;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(14px);
      animation: rise 1s ease 0.8s forwards;
      margin-bottom: 2.8rem;
    }

    /* button */
    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 2.4rem;
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--white);
      background: transparent;
      border: 1px solid var(--crimson);
      cursor: pointer;
      opacity: 0;
      transform: translateY(14px);
      animation: rise 1s ease 1s forwards;
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      overflow: hidden;
    }

    /* button shimmer fill */
    .btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--crimson) 0%, #6B0000 100%);
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .btn:hover::before { opacity: 1; }

    .btn:hover {
      border-color: var(--crimson-bright);
      box-shadow: 0 0 24px rgba(196,30,30,0.35), 0 0 60px rgba(156,0,0,0.15);
    }

    .btn span { position: relative; z-index: 1; }

    /* Google icon */
    .btn svg {
      position: relative;
      z-index: 1;
      width: 16px; height: 16px;
      flex-shrink: 0;
    }

    /* bottom signature */
    .signature {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      color: var(--black-border);
      text-transform: uppercase;
      white-space: nowrap;
      z-index: 10;
      opacity: 0;
      animation: rise 1s ease 1.5s forwards;
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="top-line"></div>
  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <main class="stage">
    <p class="eyebrow">Secure Access Portal</p>

    <h1 class="headline">
      Prove Your<br/><em>Identity</em>
    </h1>

    <div class="divider"></div>

    <p class="sub">Authenticate to continue</p>

    <a href="/api/auth/login" class="btn">
      <!-- Google G icon -->
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#fff" opacity="0.9"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#fff" opacity="0.7"/>
        <path d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.84z" fill="#fff" opacity="0.5"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#fff" opacity="0.6"/>
      </svg>
      <span>Sign in with Google</span>
    </a>
  </main>

  <p class="signature">OAuth 2.0 &nbsp;·&nbsp; Google Identity Platform</p>

</body>
</html>
