<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Cinzel:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --crimson:     #9B0000;
      --crimson-mid: #C41E1E;
      --crimson-bright: #E03030;
      --black:       #050505;
      --black-card:  #0D0D0D;
      --black-border:#1A1A1A;
      --white:       #F5F0EE;
      --white-dim:   #9A8F8F;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* ── noise grain overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 999;
    }

    /* ── blood red ambient glow ── */
    body::after {
      content: '';
      position: fixed;
      top: -20%; left: 50%;
      transform: translateX(-50%);
      width: 80vw; height: 60vh;
      background: radial-gradient(ellipse at center, rgba(156,0,0,0.18) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: pulseGlow 6s ease-in-out infinite;
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: 1; transform: translateX(-50%) scale(1); }
      50%       { opacity: 0.6; transform: translateX(-50%) scale(1.08); }
    }

    /* ── thin top accent line ── */
    .top-line {
      position: fixed; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--crimson-mid), var(--crimson-bright), var(--crimson-mid), transparent);
      z-index: 100;
      animation: slideIn 1.2s ease forwards;
    }

    /* ── corner marks ── */
    .corner {
      position: fixed;
      width: 40px; height: 40px;
      z-index: 100;
      opacity: 0;
      animation: fadeCorner 1s ease 0.8s forwards;
    }
    .corner--tl { top: 20px; left: 20px; border-top: 1px solid var(--crimson); border-left: 1px solid var(--crimson); }
    .corner--tr { top: 20px; right: 20px; border-top: 1px solid var(--crimson); border-right: 1px solid var(--crimson); }
    .corner--bl { bottom: 20px; left: 20px; border-bottom: 1px solid var(--crimson); border-left: 1px solid var(--crimson); }
    .corner--br { bottom: 20px; right: 20px; border-bottom: 1px solid var(--crimson); border-right: 1px solid var(--crimson); }
    @keyframes fadeCorner { to { opacity: 0.6; } }

    /* ── main layout ── */
    .stage {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 2rem;
    }

    /* ── eyebrow ── */
    .eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      color: var(--crimson-mid);
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(12px);
      animation: rise 0.9s ease 0.3s forwards;
      margin-bottom: 1.2rem;
    }

    /* ── divider ── */
    .divider {
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--crimson), transparent);
      margin: 1.4rem auto;
      opacity: 0;
      animation: rise 0.9s ease 0.7s forwards;
    }

    /* ── headline ── */
    .headline {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.8rem, 5vw, 3.6rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      text-align: center;
      line-height: 1.15;
      color: var(--white);
      opacity: 0;
      transform: translateY(20px);
      animation: rise 1s ease 0.5s forwards;
    }

    .headline em {
      font-style: normal;
      background: linear-gradient(135deg, var(--crimson-bright) 0%, var(--crimson-mid) 60%, #6B0000 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── name ── */
    .name-wrap {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 3vw, 1.5rem);
      font-weight: 300;
      letter-spacing: 0.2em;
      color: var(--white-dim);
      text-align: center;
      opacity: 0;
      transform: translateY(16px);
      animation: rise 1s ease 0.9s forwards;
      text-transform: uppercase;
    }

    #user {
      color: var(--white);
      font-weight: 600;
      letter-spacing: 0.25em;
    }

    /* ── status pill ── */
    .status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--white-dim);
      text-transform: uppercase;
      margin-top: 2.5rem;
      opacity: 0;
      animation: rise 1s ease 1.2s forwards;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--crimson-bright);
      box-shadow: 0 0 8px var(--crimson-bright);
      animation: blink 2s ease-in-out infinite;
    }

     /* button */
     .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 2.4rem;
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--white);
      background: transparent;
      border: 1px solid var(--crimson);
      cursor: pointer;
      opacity: 0;
      transform: translateY(14px);
      animation: rise 1s ease 1s forwards;
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      overflow: hidden;
      margin-top: 15px;
    }

    /* button shimmer fill */
    .btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--crimson) 0%, #6B0000 100%);
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .btn:hover::before { opacity: 1; }

    .btn:hover {
      border-color: var(--crimson-bright);
      box-shadow: 0 0 24px rgba(196,30,30,0.35), 0 0 60px rgba(156,0,0,0.15);
    }

    .btn span { position: relative; z-index: 1; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── animations ── */
    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }

    /* ── bottom signature ── */
    .signature {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: var(--black-border);
      text-transform: uppercase;
      white-space: nowrap;
      z-index: 10;
      opacity: 0;
      animation: rise 1s ease 1.6s forwards;
    }
  </style>
  <meta http-equiv="Content-Security-Policy" content="img-src 'self' https://lh3.googleusercontent.com">
</head>
<body>

  <div class="top-line"></div>
  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <main class="stage">
    <p class="eyebrow">Authentication Confirmed</p>

    <h1 class="headline">
      Access <em>Granted</em>
    </h1>

    <div class="divider"></div>

    <p class="name-wrap">
      Identity verified &mdash; <span id="user">loading...</span>
    </p>

    <div class="photo-wrap">
      <img id= "photos">
    </div>

    <div class="status">
      <span class="status-dot"></span>
      Secure session active
    </div>
    <a href="/api/auth/logout" class="btn">
        <span>Logout</span>
    </a>
  </main>

  <p class="signature">OAuth 2.0 &nbsp;·&nbsp; Google Identity Platform</p>

  <script>
    fetch('/api/me')
      .then(response => response.json())
      .then(data => {
        document.getElementById('user').textContent = data.name
      })
      .catch(() => {
        document.getElementById('user').textContent = 'Unknown'
      })
  </script>
  <script>
    fetch('/api/info')
    .then(response => response.json())
    .then(data => {
      document.getElementById('photos').src = data.photos[0].url
    })
  </script>
</body>
</html>
